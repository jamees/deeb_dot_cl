<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>Blog deeb - Innovación, Desarrollo y Transformación Digital</title>
    <meta name="title" content="Blog deeb - Innovación, Desarrollo y Transformación Digital">
    <meta name="description" content="Descubre insights sobre desarrollo de software, arquitectura empresarial, modernización tecnológica y transformación digital. Artículos escritos por expertos de deeb.">
    <meta name="keywords" content="desarrollo software, transformación digital, arquitectura empresarial, SaaS, cloud computing, deeb, tecnología">
    <meta name="author" content="deeb">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://deeb.com/blog.html">
    <meta property="og:title" content="Blog deeb - Innovación, Desarrollo y Transformación Digital">
    <meta property="og:description" content="Descubre insights sobre desarrollo de software, arquitectura empresarial, modernización tecnológica y transformación digital.">
    <meta property="og:image" content="https://deeb.com/images/blog-og-image.jpg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://deeb.com/blog.html">
    <meta property="twitter:title" content="Blog deeb - Innovación, Desarrollo y Transformación Digital">
    <meta property="twitter:description" content="Descubre insights sobre desarrollo de software, arquitectura empresarial, modernización tecnológica y transformación digital.">
    <meta property="twitter:image" content="https://deeb.com/images/blog-og-image.jpg">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://deeb.com/blog.html">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/image_logo_white.png">
    
    <link rel="stylesheet" href="css/modern-style.css">
    <link rel="stylesheet" href="css/mobile-menu.css">
    <script src="js/header.js"></script>
</head>
<body>
    <!-- HEADER -->
    <div id="header-container"></div>

    <!-- BLOG HERO -->
    <section class="blog-hero">
        <div class="container">
            <div class="blog-hero-content">
                <h1>Blog de deeb</h1>
                <p>Insights sobre tecnología, innovación y transformación digital</p>
            </div>
        </div>
    </section>

    <!-- BLOG POSTS -->
    <section class="blog-page">
        <div class="container">
            <div class="blog-page-grid">
                <!-- Los artículos se cargan dinámicamente desde data/blog-content.json -->
            </div>

            <!-- Newsletter CTA -->
            <div class="blog-newsletter-cta">
                <h3>¿Te gustó este contenido?</h3>
                <p>Suscríbete para recibir los últimos artículos sobre tecnología e innovación</p>
                <form class="newsletter-form-inline">
                    <input type="email" placeholder="tu@email.com" class="newsletter-input" required>
                    <button type="submit" class="newsletter-btn">Suscribirse</button>
                </form>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2025 deeb. Todos los derechos reservados.</p>
                <div class="footer-links-inline">
                    <a href="index.html">Inicio</a>
                    <a href="index.html#servicios">Servicios</a>
                    <a href="index.html#blog">Publicaciones</a>
                    <a href="blog.html">Blog</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Blog Loader Script -->
    <script src="js/blog-loader.js"></script>
    
    <script>
        // Newsletter Form
        document.querySelector('.newsletter-form-inline').addEventListener('submit', function(e) {
            e.preventDefault();
            const emailInput = this.querySelector('.newsletter-input');
            alert('¡Gracias por suscribirte! Te enviaremos noticias a ' + emailInput.value);
            emailInput.value = '';
        });
    </script>
    
    <!-- Mobile Menu Script -->
    <script type="module" src="js/mobile-menu.js"></script>
</body>
</html>
