<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículo - Blog deeb</title>
    <meta name="description" content="Lee el artículo completo en el blog de deeb">
    <link rel="stylesheet" href="css/modern-style.css">
    <link rel="stylesheet" href="css/mobile-menu.css">
    <script src="js/header.js"></script>
    <style>
        .article-page {
            padding: 4rem 0;
        }

        .container-article {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .article-header {
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .article-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .article-meta {
            display: flex;
            gap: 2rem;
            color: #6b7280;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .article-topics {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .topic {
            display: inline-block;
            background: #f3f4f6;
            color: #3B82F6;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .article-content {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #374151;
            margin-bottom: 3rem;
        }

        .article-content h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-color);
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }

        .article-content h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-color);
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .article-content p {
            margin-bottom: 1.5rem;
        }

        .article-content ul,
        .article-content ol {
            margin-left: 2rem;
            margin-bottom: 1.5rem;
        }

        .article-content li {
            margin-bottom: 0.75rem;
        }

        .article-content blockquote {
            border-left: 4px solid #3B82F6;
            padding-left: 1.5rem;
            margin: 2rem 0;
            font-style: italic;
            color: #6b7280;
        }

        .article-content blockquote cite {
            display: block;
            margin-top: 0.5rem;
            font-style: normal;
            color: #9ca3af;
        }

        .article-content strong {
            color: var(--text-color);
            font-weight: 600;
        }

        .article-content a {
            color: #3B82F6;
            text-decoration: none;
            font-weight: 500;
        }

        .article-content a:hover {
            text-decoration: underline;
        }

        .article-nav {
            display: flex;
            gap: 1rem;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e5e7eb;
        }

        .btn-secondary {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #f3f4f6;
            color: #374151;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-primary {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #3B82F6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #2563EB;
        }

        @media (max-width: 768px) {
            .article-header h1 {
                font-size: 1.8rem;
            }

            .article-meta {
                gap: 1rem;
                font-size: 0.9rem;
            }

            .article-content {
                font-size: 1rem;
            }

            .article-content h2 {
                font-size: 1.5rem;
            }

            .article-nav {
                flex-direction: column;
            }

            .btn-secondary,
            .btn-primary {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div id="header-container"></div>

    <!-- ARTICLE CONTENT -->
    <div class="article-full-content">
        <!-- Contenido cargado dinámicamente por blog-loader.js -->
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2025 deeb. Todos los derechos reservados.</p>
                <div class="footer-links-inline">
                    <a href="index.html">Inicio</a>
                    <a href="index.html#servicios">Servicios</a>
                    <a href="index.html#blog">Publicaciones</a>
                    <a href="blog.html">Blog</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Blog Loader Script -->
    <script src="js/blog-loader.js"></script>
    
    <!-- Mobile Menu Script -->
    <script type="module" src="js/mobile-menu.js"></script>
</body>
</html>
